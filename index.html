function drawHUD(){
  // ===== SCORE — top left, bright pink, black edge =====
  var popScale=1+Math.max(0,scorePopT)*0.8;
  ctx.save();ctx.translate(20,34);ctx.scale(popScale,popScale);
  ctx.textAlign="left";ctx.textBaseline="middle";
  ctx.font="900 38px 'Segoe UI',system-ui,sans-serif";ctx.lineJoin="round";
  ctx.strokeStyle="#1a1a1a";ctx.lineWidth=7;ctx.strokeText(score,0,0);
  ctx.fillStyle="#ff3090";ctx.fillText(score,0,0);
  // sparkle effect — scales with digit count
  if(scorePopT>0){
    var scoreStr=""+score;
    var textW=ctx.measureText(scoreStr).width;
    var cx=textW/2, cy=0; // center of the score text
    var sparkR=Math.max(30,textW*0.6)+scorePopT*18;
    for(var i=0;i<6;i++){var sa=i/6*6.283+drawT*8;
    ctx.fillStyle="rgba(255,255,255,"+clamp(scorePopT*2.5,0,0.8).toFixed(2)+")";
    ctx.beginPath();ctx.arc(cx+Math.cos(sa)*sparkR,cy+Math.sin(sa)*sparkR*0.7,2.5*scorePopT+1.2,0,6.283);ctx.fill();}
  }
  ctx.restore();

  // ===== BEST — top center with crown (bigger) =====
  if(highScore>0){
    var bx=W/2,by=30;
    ctx.fillStyle="rgba(255,240,200,0.5)";
    pillPath(bx,by,150,36);ctx.fill();
    ctx.strokeStyle="rgba(255,215,100,0.45)";ctx.lineWidth=2;
    pillPath(bx,by,150,36);ctx.stroke();
    drawCrown(bx-60,by,0.9);
    ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.font="900 20px 'Segoe UI',system-ui,sans-serif";
    ctx.fillStyle="#c89020";ctx.fillText(highScore,bx+10,by);
  }

  // ===== FRUIT COUNTER — top right (bigger, apple icon) =====
  var fPillW=100,fPillX=W-12-fPillW/2,fPillY=30;
  ctx.fillStyle="rgba(255,230,240,0.5)";
  pillPath(fPillX,fPillY,fPillW,36);ctx.fill();
  ctx.strokeStyle="rgba(255,180,200,0.4)";ctx.lineWidth=1.5;
  pillPath(fPillX,fPillY,fPillW,36);ctx.stroke();
  // apple icon (FRUITS[2] = apple)
  ctx.save();ctx.translate(fPillX-fPillW/2+20,fPillY);ctx.scale(0.8,0.8);drawFruit(0,0,FRUITS[2],drawT*2);ctx.restore();
  // count text
  ctx.textAlign="center";ctx.textBaseline="middle";
  ctx.font="900 20px 'Segoe UI',system-ui,sans-serif";
  ctx.fillStyle="#e04060";ctx.fillText(fruitCount,fPillX+14,fPillY);
}

// ---- MAIN DRAW ------------------------------------------------
function draw(dt){
  drawT+=dt;ctx.save();
  var sx=0,sy=0;
  if(shakeT>0&&state===S_PLAY){sx=(Math.random()-0.5)*shakeT*55;sy=(Math.random()-0.5)*shakeT*55}
  ctx.translate(sx,sy);

  drawSky();
  drawClouds();
  drawHills();

  ctx.save();ctx.translate(0,-camY);
  drawPlatforms();
  for(var i=0;i<fruits.length;i++){var f=fruits[i];if(!f.alive)continue;drawFruit(f.x,f.y,f.fruit,f.t,f.isSuper)}
  drawEnemies();
  drawBoss();

  // particles with glow
  for(var i=0;i<particles.length;i++){
    var p=particles[i];var a=clamp(p.life/p.max,0,1);
    ctx.globalAlpha=a*0.3;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.sz*a*2,0,6.283);ctx.fill();
    ctx.globalAlpha=a;ctx.beginPath();ctx.arc(p.x,p.y,p.sz*a,0,6.283);ctx.fill();
  }
  ctx.globalAlpha=1;

  // float texts - big juicy popups
  for(var i=0;i<floatTexts.length;i++){
    var ft=floatTexts[i];var a=clamp(ft.life/ft.max,0,1);
    // elastic pop: overshoots then settles
    var raw=1-a; // 0 at spawn, 1 at death
    var s=raw<0.15?(raw/0.15)*1.4:(1.4-0.4*((raw-0.15)/0.85));
    ctx.save();ctx.translate(ft.x,ft.y);ctx.scale(s,s);
    ctx.globalAlpha=a;
    ctx.font="900 24px 'Segoe UI',system-ui,sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";ctx.lineJoin="round";
    // glow
    ctx.shadowColor=ft.col;ctx.shadowBlur=12;
    ctx.strokeStyle="rgba(255,255,255,0.9)";ctx.lineWidth=5;ctx.strokeText(ft.txt,0,0);
    ctx.fillStyle=ft.col;ctx.fillText(ft.txt,0,0);
    ctx.shadowBlur=0;
    ctx.restore();
  }
  ctx.globalAlpha=1;

  // player
  if(state!==S_OVER){
    drawMochi(player.x,player.y,player.face,player.sqX,player.sqY,player.happyT>0,player.blinkT,false);
  }
  ctx.restore(); // camera

  // HUD
  if(state===S_PLAY||state===S_DYING) drawHUD();

  // boss warning overlay (screen space)
  if(boss&&boss.active&&state===S_PLAY){
    var warnA=boss.permanent?0.08+Math.sin(drawT*8)*0.05:0.05+Math.sin(drawT*6)*0.03;
    var vg=ctx.createRadialGradient(W/2,H/2,H*0.3,W/2,H/2,H*0.7);
    vg.addColorStop(0,"rgba(200,30,60,0)");
    vg.addColorStop(1,"rgba(200,30,60,"+warnA.toFixed(3)+")");
    ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
    if(false){ // boss text removed
    }
    // timer bar (only for non-permanent)
    if(!boss.permanent){
      var barW=120,barH=6,barX=W/2-barW/2,barY=68;
      ctx.fillStyle="rgba(0,0,0,0.2)";
      pillPath(barX+barW/2,barY,barW,barH);ctx.fill();
      var fill=clamp(boss.life/boss.maxLife,0,1);
      if(fill>0){ctx.fillStyle="rgba(200,50,80,0.7)";pillPath(barX+fill*barW/2,barY,fill*barW,barH);ctx.fill();}
    }
  }
  ctx.restore(); // shake
}

// ---- MENU SCREEN ----------------------------------------------
function drawMenu(){
  drawSky();drawClouds();drawHills();

  // ---- animated scene ----
  // platforms
  for(var i=0;i<7;i++){
    var px=15+i*62,py=410+Math.sin(drawT*0.8+i*1.05)*16;
    ctx.save();ctx.translate(px,py);

// ---- SHOP SCREEN ----------------------------------------------
function drawShop(){

  // measure to position side by side
  var mw=ctx.measureText("MOCHI ").width;
  var sw=ctx.measureText("SHOP").width;

  ctx.strokeStyle="#fff";ctx.lineWidth=7;

      ctx.fillRect(-1,4,2,3);

  // back button

  ctx.strokeStyle="#fff";ctx.lineWidth=2.5;pillPath(0,0,120,36);ctx.stroke();
  ctx.fillStyle="#fff";ctx.font="900 15px 'Segoe UI',system-ui,sans-serif";

  ctx.restore();

// ---- CLICK/TAP ------------------------------------------------
function handleClick(cx,cy){
  audio();initMusic();
  if(state===S_MENU){
    if(cx>W/2-115&&cx<W/2+115&&cy>535&&cy<598){initGame();state=S_PLAY;return}
    if(cx>W/2-80&&cx<W/2+80&&cy>600){state=S_SHOP;return}
    return;
  }
  if(state===S_OVER){
    // play again button (y ~480-520 range depending on layout)
    if(cx>W/2-130&&cx<W/2+130&&cy>460&&cy<545){initGame();state=S_PLAY;initMusic();return}
    // menu button (y ~555-600 range)
    if(cx>W/2-70&&cx<W/2+70&&cy>545){state=S_MENU;initMusic();return}
    return;
  }
  if(state===S_SHOP){
    // back button
    if(cx>W/2-65&&cx<W/2+65&&cy>H-55&&cy<H-15){state=S_MENU;return}
    // skin cards
    for(var i=0;i<SKINS.length;i++){
      var cardY=150+i*88;
      if(cy>cardY-38&&cy<cardY+38){
        var unlocked=fruitsTotal>=SKINS[i].cost||SKINS[i].cost===0;
        if(unlocked&&i!==selectedSkin){
          selectedSkin=i;
          try{localStorage.setItem("mj_skin",""+i)}catch(e){}
        }
        return;
      }
    }
  }
}

// ---- INPUT ----------------------------------------------------
document.addEventListener("keydown",function(e){keys[e.keyCode]=true;initMusic();if(e.keyCode===32){if(state===S_MENU||state===S_OVER){initGame();state=S_PLAY}}});
document.addEventListener("keyup",function(e){keys[e.keyCode]=false});
canvas.addEventListener("mousedown",function(e){var r=canvas.getBoundingClientRect();handleClick((e.clientX-r.left)*(W/r.width),(e.clientY-r.top)*(H/r.height))});
canvas.addEventListener("touchstart",function(e){e.preventDefault();var r=canvas.getBoundingClientRect();for(var i=0;i<e.touches.length;i++){var cx=(e.touches[i].clientX-r.left)*(W/r.width),cy=(e.touches[i].clientY-r.top)*(H/r.height);handleClick(cx,cy);if(state===S_PLAY){touchSide=cx<W*0.4?-1:cx>W*0.6?1:0}}},{passive:false});
canvas.addEventListener("touchmove",function(e){e.preventDefault();if(state!==S_PLAY)return;var r=canvas.getBoundingClientRect();var cx=(e.touches[0].clientX-r.left)*(W/r.width);touchSide=cx<W*0.4?-1:cx>W*0.6?1:0},{passive:false});
canvas.addEventListener("touchend",function(e){e.preventDefault();if(e.touches.length===0)touchSide=0},{passive:false});

// ---- MAIN LOOP ------------------------------------------------
var lastT=0;
function loop(ts){
  var dt=Math.min((ts-lastT)/1000,0.05);lastT=ts;
  update(dt);
  // menu music — play cute phase 0 on menu
  if((state===S_MENU||state===S_SHOP)&&musicStarted) updateMusic(500,0);
  ctx.clearRect(0,0,W,H);
  if(state===S_MENU)drawMenu();
  else if(state===S_SHOP){drawSky();drawClouds();drawHills();drawShop();}
  else{draw(dt);if(state===S_OVER)drawGameOver();}
  requestAnimationFrame(loop);
}
try{localStorage.removeItem("mj_hi");localStorage.removeItem("mj_fr");localStorage.removeItem("mj_skin")}catch(e){}
highScore=0;fruitsTotal=0;selectedSkin=0;
initGame();requestAnimationFrame(loop);
})();
</script>
